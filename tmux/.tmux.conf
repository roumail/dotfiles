# reloading tmux conf
# tmux source ~/.tmux.conf
# :source-file ~/.tmux.conf 
# Prefix + r

# ----------------------------
# General Appearance
# ----------------------------
# Neutral base for status bar
set -g status-style bg=default

# Colored session tag (status-left)
set -g status-left "#[bg=colour4,fg=black] #S #[default]"
set -g status-left-length 20
set -g status-justify centre
set -g status-right ""
set -g status-right "#[fg=colour8]#{client_tty} | #{session_dots}"
set -g status-right-length 50

set -g @status-colors "colour1 colour2 colour4 colour5 colour6 colour208 colour135"

# Hook to set color on session creation
set-hook -g session-created 'run-shell " \
    colors=($(tmux show -gv @status-colors)); \
    session_name=\"$(tmux display-message -p \"#S\")\"; \
    hash_val=$(echo -n \"$session_name\" | cksum | cut -d\" \" -f1); \
    col_idx=$(( hash_val % ${#colors[@]} )); \
    next=${colors[$col_idx]}; \
    tmux set -t \"$session_name\" status-left \"#[bg=$next,fg=black,bold] #S #[default]\" \
"'
# Make it possible to cycle session color? 
# Window naming
set -g automatic-rename on
set -g allow-rename off
set -g renumber-windows on

# ----------------------------
# Terminal / Color Support
# ----------------------------

# Set default terminal for 256-color support
# Best → Good → Fallback order
# Better default terminal (use 'tmux-256color' if supported)
set -g default-terminal "tmux-256color"
# Enable true color and italics for common terminals
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
set -as terminal-overrides ',alacritty*:Tc:sitm=\E[3m'
set -ga terminal-overrides ',screen*:Tc:sitm=\E[3m'
# Fallback to "xterm-256color" or "screen-256color" if tmux-256color isn't available

# ----------------------------
# Pane management
# ----------------------------

# Toggle pane zoom
bind m resize-pane -Z

# Easier and faster switching between next/prev window
bind -r C-p previous-window
bind -r C-n next-window

# ----------------------------
# Sensible (tmux sensible)
# ----------------------------
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

bind b last-window
bind B switch-client -l
# ----------------------------
# Reload config
# ----------------------------

bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ----------------------------
# Clipboard / Mouse
# ----------------------------

set -g set-clipboard on
# Enable mouse support
set -g mouse on
# Handle xterm escape sequences 
set -g xterm-keys on

# ----------------------------
# Copy Mode (vi style)
# ----------------------------

set-window-option -g mode-keys vi
bind-key [ copy-mode
# Default (mac + linux)
bind-key ] paste-buffer 

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi C-v send -X begin-selection \; send -X rectangle-toggle
bind-key -T copy-mode-vi Escape send -X cancel

# WSL: copy to windows clipboard
if-shell 'uname -r | grep -qi microsoft' \
    "bind-key -T copy-mode-vi 'y' send -X copy-selection-and-pipe '/mnt/c/Windows/System32/clip.exe'"
if-shell 'uname -r | grep -qi microsoft' \
    "bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-pipe '/mnt/c/Windows/System32/clip.exe'"

# macOS: copy to pbcopy
if-shell 'uname | grep -q Darwin' \
    "bind-key -T copy-mode-vi 'y' send -X copy-selection-and-pipe 'pbcopy'; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-pipe 'pbcopy'" \
     ""
# ----------------------------
# TPM Plugins
# ----------------------------

set -g @plugin 'tmux-plugins/tpm'
# to be set BEFORE resurrect
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'jtmcginty/tmux-session-dots'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Automatically restore sessions
set -g @continuum-restore 'on'

# Save pane contents
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '5'
# j is taken by 
set -g @jump-key 'f'
set -g @jump-bg-color '\e[0m\e[90m'
set -g @jump-fg-color '\e[1m\e[31m'
# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
